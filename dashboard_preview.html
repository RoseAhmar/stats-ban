<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дашборд — Закупки аккаунтов</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f0efeb;
    color: #1c1c1a;
    min-height: 100vh;
    padding: 2rem;
    font-size: 15px;
    line-height: 1.5;
  }
  .dash { max-width: 1280px; margin: 0 auto; }
  .page-header { margin-bottom: 2rem; padding-bottom: 1.25rem; border-bottom: 1px solid rgba(0,0,0,0.1); }
  .page-title { font-size: 26px; font-weight: 600; letter-spacing: -0.5px; color: #1c1c1a; }
  .page-sub { font-size: 14px; color: #888780; margin-top: 4px; }

  .top-metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 2rem; }
  .metric { background: #fff; border-radius: 14px; padding: 1.25rem 1.5rem; border: 1px solid rgba(0,0,0,0.07); }
  .metric-label { font-size: 13px; color: #888780; font-weight: 500; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
  .metric-value { font-size: 32px; font-weight: 600; color: #1c1c1a; letter-spacing: -1px; }
  .metric-hint { font-size: 12px; color: #bbb; margin-top: 4px; }

  .controls {
    display: flex; gap: 12px; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center;
    background: #fff; padding: 0.875rem 1.25rem; border-radius: 12px; border: 1px solid rgba(0,0,0,0.07);
  }
  .controls label { font-size: 14px; color: #888780; font-weight: 500; }
  .controls select, .controls input {
    font-size: 14px; font-family: 'Inter', sans-serif; padding: 6px 12px;
    border: 1px solid rgba(0,0,0,0.15); border-radius: 8px; background: #f7f7f5;
    color: #1c1c1a; cursor: pointer; outline: none;
  }
  .controls input { cursor: text; width: 80px; }
  .controls select:focus, .controls input:focus { border-color: #888; }
  .controls .sep { width: 1px; height: 24px; background: rgba(0,0,0,0.1); margin: 0 4px; }

  .section-label { font-size: 13px; font-weight: 600; color: #888780; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 1rem; }

  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; margin-bottom: 2.5rem; }
  .card { background: #fff; border-radius: 16px; padding: 1.25rem 1.5rem; border: 1px solid rgba(0,0,0,0.07); transition: box-shadow 0.15s; }
  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
  .card-id { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
  .card-gmail { font-size: 13px; color: #888780; margin-top: 3px; font-weight: 500; }
  .card-badge { font-size: 13px; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
  .badge-green { background: #E3F3D5; color: #2d6010; }
  .badge-amber { background: #FEF0D8; color: #7a4a08; }
  .badge-red   { background: #FDEAEA; color: #8f2020; }

  .farm-section { margin-bottom: 1rem; }
  .farm-label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .farm-label { font-size: 12px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; }
  .farm-counts { font-size: 13px; color: #888780; }
  .bar-bg { height: 6px; background: #ebebeb; border-radius: 99px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 99px; }

  .divider { height: 1px; background: rgba(0,0,0,0.07); margin: 1rem 0; }

  .doc-block { margin-bottom: 10px; }
  .doc-block:last-child { margin-bottom: 0; }
  .doc-name-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .doc-name { font-size: 14px; font-weight: 600; color: #1c1c1a; }
  .doc-valid-count { font-size: 12px; color: #aaa; }
  .doc-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .doc-bar-bg { flex: 1; height: 5px; background: #ebebeb; border-radius: 99px; overflow: hidden; }
  .doc-bar-fill { height: 100%; border-radius: 99px; }
  .doc-ver-pct { font-size: 14px; font-weight: 600; min-width: 42px; text-align: right; }
  .doc-counters { display: flex; gap: 6px; flex-wrap: wrap; }
  .doc-counter { font-size: 12px; font-weight: 500; padding: 3px 10px; border-radius: 20px; }
  .cnt-pass { background: #E3F3D5; color: #2d6010; }
  .cnt-fail { background: #FDEAEA; color: #8f2020; }
  .cnt-wait { background: #f0efeb; color: #888780; }
  .doc-no-vna { font-size: 13px; color: #bbb; font-style: italic; }

  .heatmap-section { background: #fff; border-radius: 16px; padding: 1.5rem; border: 1px solid rgba(0,0,0,0.07); margin-bottom: 1.5rem; overflow-x: auto; }
  .heatmap-table { border-collapse: separate; border-spacing: 0; font-size: 14px; width: 100%; }
  .heatmap-table th { padding: 8px 14px; color: #888780; font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; text-align: left; border-bottom: 2px solid #f0efeb; white-space: nowrap; }
  .heatmap-table td { padding: 9px 14px; text-align: center; border-bottom: 1px solid #f5f5f3; white-space: nowrap; font-size: 14px; font-weight: 500; }
  .heatmap-table tr:last-child td { border-bottom: none; }
  .heatmap-table .id-cell { text-align: left; color: #555; font-weight: 600; font-size: 14px; }
  .heatmap-table .gmail-cell { text-align: left; color: #888780; font-weight: 500; min-width: 110px; }
  .heatmap-table .farm-cell { font-weight: 600; }

  .legend { display: flex; gap: 16px; font-size: 13px; color: #888780; flex-wrap: wrap; align-items: center; margin-top: 1rem; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-box { width: 14px; height: 14px; border-radius: 4px; }

  .empty-state { text-align: center; padding: 3rem; color: #bbb; font-size: 15px; }

  .hm-cell { position: relative; cursor: default; }
  .hm-cell .tooltip {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: #1c1c1a;
    color: #fff;
    font-size: 12px;
    font-weight: 400;
    border-radius: 8px;
    padding: 8px 12px;
    white-space: nowrap;
    z-index: 100;
    min-width: 160px;
    pointer-events: none;
    line-height: 1.8;
    text-align: left;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  .hm-cell .tooltip::before {
    content: '';
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-bottom-color: #1c1c1a;
  }
  .hm-cell:hover .tooltip { display: block; }

  .card-comment { margin-top: 10px; border-top: 0.5px solid rgba(0,0,0,0.07); padding-top: 10px; }
  .comment-label { font-size: 11px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
  .comment-input {
    width: 100%; font-size: 13px; font-family: 'Inter', sans-serif;
    border: 1px solid rgba(0,0,0,0.12); border-radius: 8px;
    padding: 7px 10px; resize: vertical; min-height: 60px;
    background: #f7f7f5; color: #1c1c1a; outline: none;
    transition: border-color 0.15s;
    line-height: 1.5;
  }
  .comment-input:focus { border-color: #888; background: #fff; }
  .comment-input::placeholder { color: #bbb; }
  .comment-saved { font-size: 11px; color: #3a7d15; margin-top: 4px; display: none; }

  .loss-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
  .loss-tag { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; background: #FDEAEA; color: #8f2020; }
  .doc-block { margin-bottom: 14px; }
  .doc-block:last-child { margin-bottom: 0; }
  .doc-name-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .doc-name { font-size: 14px; font-weight: 600; color: #1c1c1a; }
  .stage-label { font-size: 11px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; }
  .stage-count { font-size: 11px; color: #aaa; }
  .stack-bar { height: 6px; border-radius: 99px; overflow: hidden; display: flex; background: #ebebeb; margin-bottom: 6px; }
  .stack-seg { height: 100%; }
  .stack-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .stag { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; }
  .stag-pass { background: #E3F3D5; color: #2d6010; }
  .stag-fail { background: #FDEAEA; color: #8f2020; }
  .stag-queue { background: #E6F1FB; color: #185FA5; }
  .stag-other { background: #EEEDFE; color: #3C3489; }
  .stag-with-tip { position: relative; cursor: default; }
  .stag-with-tip .stag-tip {
    display: none;
    position: absolute;
    bottom: calc(100% + 7px);
    left: 50%;
    transform: translateX(-50%);
    background: #1c1c1a;
    color: #fff;
    font-size: 12px;
    font-weight: 400;
    border-radius: 8px;
    padding: 8px 12px;
    white-space: nowrap;
    z-index: 200;
    min-width: 170px;
    pointer-events: none;
    line-height: 1.8;
    text-align: left;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  }
  .stag-with-tip .stag-tip::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: #1c1c1a;
  }
  .stag-with-tip:hover .stag-tip { display: block; }

  .hm-popup {
    display: none;
    position: absolute;
    background: #1c1c1a;
    color: #e0e0e0;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    min-width: 180px;
    z-index: 200;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    line-height: 1.8;
    pointer-events: none;
  }
  .hm-popup.visible { display: block; }
  .hm-popup-title { font-weight: 600; font-size: 12px; color: #888; margin-bottom: 4px; border-bottom: 0.5px solid #333; padding-bottom: 4px; }
  .hm-popup-row { display: flex; justify-content: space-between; gap: 16px; }
  .hm-popup-label { color: #888; }
  .hm-popup-val { font-weight: 600; }

  /* TABS */
  .tabs { display: flex; gap: 4px; margin-bottom: 1.75rem; border-bottom: 2px solid rgba(0,0,0,0.08); }
  .tab-btn { font-size: 14px; font-weight: 600; font-family: Inter, sans-serif; padding: 8px 20px; border: none; background: none; cursor: pointer; color: #888780; border-bottom: 2px solid transparent; margin-bottom: -2px; border-radius: 6px 6px 0 0; transition: color 0.15s, border-color 0.15s; }
  .tab-btn:hover { color: #1c1c1a; }
  .tab-btn.active { color: #1c1c1a; border-bottom-color: #1c1c1a; }
  .tab-page { display: none; }
  .tab-page.active { display: block; }

  /* BUYERS */
  .buyer-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px; }
  .buyer-card { background: #fff; border-radius: 16px; padding: 1.25rem 1.5rem; border: 1px solid rgba(0,0,0,0.07); transition: box-shadow 0.15s; }
  .buyer-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
  .buyer-name { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; margin-bottom: 4px; }
  .buyer-total { font-size: 13px; color: #888780; margin-bottom: 1rem; }
  .buyer-stack { height: 8px; border-radius: 99px; overflow: hidden; display: flex; background: #ebebeb; margin-bottom: 8px; }
  .buyer-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 1rem; }
  .buyer-doc-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; padding: 5px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
  .buyer-doc-row:last-child { border-bottom: none; }
  .buyer-doc-name { font-weight: 600; color: #1c1c1a; }
  .buyer-pct { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
  .buyer-metrics { display: flex; gap: 16px; margin-bottom: 1rem; }
  .buyer-metric { flex: 1; }
  .buyer-metric-label { font-size: 11px; color: #aaa; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 3px; }
  .buyer-metric-val { font-size: 20px; font-weight: 600; }
</style>
</head>
<body>
<div class="dash">

  <div class="page-header">
    <div class="page-title">Закупки аккаунтов</div>
    <div class="page-sub">Почты → фарм → аккаунты → верификация, обновлено 03.04.2026 13:39</div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('purchases')">Закупки</button>
    <button class="tab-btn" onclick="switchTab('buyers')">Баера</button>
  </div>

  <div class="tab-page active" id="tab-purchases">

  <div class="top-metrics" id="top-metrics"></div>

  <div class="controls">
    <label>ID закупки:</label>
    <input type="text" id="filter-id" placeholder="напр. 28" oninput="render()" />
    <div class="sep"></div>
    <label>Gmail Seller:</label>
    <select id="filter-gmail" onchange="render()"><option value="">Все</option></select>
    <div class="sep"></div>
    <label>Doc Seller:</label>
    <select id="filter-doc" onchange="render()"><option value="">Все</option></select>
    <div class="sep"></div>
    <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
      <input type="checkbox" id="hide-empty" onchange="render()" style="cursor:pointer;">
      Скрыть без аккаунтов
    </label>
    <div class="sep"></div>
    <label>Сортировка:</label>
    <select id="sort-by" onchange="render()">
      <option value="id">По ID закупки</option>
      <option value="valid_desc">Валидность почт ↓</option>
      <option value="valid_asc">Валидность почт ↑</option>
      <option value="ver_desc">Верификация ↓ (лучшие)</option>
      <option value="ver_asc">Верификация ↑ (худшие)</option>
    </select>
  </div>

  <div class="section-label">Карточки закупок</div>
  <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:1rem;font-size:12px;color:#888780;">
    <span style="font-weight:600;">Верификация:</span>
    <span style="display:flex;align-items:center;gap:5px;"><span style="width:12px;height:12px;border-radius:3px;background:#3a7d15;display:inline-block;"></span>Прошли</span>
    <span style="display:flex;align-items:center;gap:5px;"><span style="width:12px;height:12px;border-radius:3px;background:#c02020;display:inline-block;"></span>На замену</span>
    <span style="display:flex;align-items:center;gap:5px;"><span style="width:12px;height:12px;border-radius:3px;background:#185FA5;display:inline-block;"></span>В очереди (Ready to work, Review и др.)</span>
    <span style="display:flex;align-items:center;gap:5px;"><span style="width:12px;height:12px;border-radius:3px;background:#534AB7;display:inline-block;"></span>Прочие статусы</span>
  </div>
  <div class="cards-grid" id="cards"></div>

  <div class="section-label">Тепловая карта — % успеха верификации</div>
  <div class="heatmap-section">
    <table class="heatmap-table" id="heatmap"></table>
    <div class="legend">
      <span style="font-weight:600;">Верификация:</span>
      <span class="legend-item"><span class="legend-box" style="background:#E3F3D5;"></span>80% и выше</span>
      <span class="legend-item"><span class="legend-box" style="background:#FEF0D8;"></span>60–79%</span>
      <span class="legend-item"><span class="legend-box" style="background:#FDEAEA;"></span>ниже 60%</span>
      <span class="legend-item"><span class="legend-box" style="background:#f0efeb;border:1px solid #ddd;"></span>нет данных</span>
    </div>
  </div>
  </div><!-- /tab-purchases -->

  <div class="tab-page" id="tab-buyers">
    <div class="top-metrics" id="buyers-metrics"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:1.5rem;margin-bottom:1rem;">
      <div class="section-label" style="margin:0;">Карточки баеров</div>
      <div style="display:flex;align-items:center;gap:8px;">
        <label style="font-size:13px;color:#888780;font-weight:500;">Баер:</label>
        <select id="buyer-filter" onchange="renderBuyers()" style="font-size:13px;font-family:Inter,sans-serif;padding:5px 10px;border:1px solid rgba(0,0,0,0.15);border-radius:8px;background:#f7f7f5;color:#1c1c1a;cursor:pointer;outline:none;">
          <option value="">Все</option>
        </select>
      </div>
    </div>
    <div class="buyer-cards" id="buyer-cards"></div>
  </div><!-- /tab-buyers -->

</div>

function toggleComment(id){
  const body=document.getElementById('comment-body-'+id);
  const arrow=document.getElementById('comment-arrow-'+id);
  const isOpen=body.style.display!=='none';
  body.style.display=isOpen?'none':'block';
  arrow.textContent=isOpen?'▶':'▼';
  if(!isOpen) document.getElementById('comment_'+id).focus();
}

function saveComment(id, val) {
  try { localStorage.setItem('comment_' + id, val); } catch(e) {}
  const el = document.getElementById('saved_' + id);
  if (el) { el.style.display = 'block'; setTimeout(() => { el.style.display = 'none'; }, 1500); }
  const preview = document.getElementById('comment-preview-' + id);
  if (preview) preview.textContent = val;
}
function loadComment(id) {
  try { return localStorage.getItem('comment_' + id) || ''; } catch(e) { return ''; }
}

function farmColor(p){return p>=80?'#3a7d15':p>=60?'#9a5c08':'#c02020';}
function verColor(p){return p>=80?'#3a7d15':p>=60?'#9a5c08':'#c02020';}
function verBg(p){return p>=80?{bg:'#E3F3D5',c:'#2d6010'}:p>=60?{bg:'#FEF0D8',c:'#7a4a08'}:{bg:'#FDEAEA',c:'#8f2020'};}
function badgeClass(p){return p>=80?'badge-green':p>=60?'badge-amber':'badge-red';}

function getFiltered(){
  const g=document.getElementById('filter-gmail').value;
  const dc=document.getElementById('filter-doc').value;
  const idQ=document.getElementById('filter-id').value.trim();
  let d=[...DATA];
  if(idQ) d=d.filter(x=>x.id===idQ);
  if(g) d=d.filter(x=>x.gmail===g);
  if(dc) d=d.filter(x=>x.docs.some(doc=>doc.doc===dc));
  const hideEmpty=document.getElementById('hide-empty');
  if(hideEmpty&&hideEmpty.checked) d=d.filter(x=>Number(x.valid)>0);
  const s=document.getElementById('sort-by').value;
  const getVerPct = x => {
    const allDocs = x.docs||[];
    const totalPassed = allDocs.reduce((s,d)=>s+Number(d.passed||0),0);
    const totalVna = allDocs.reduce((s,d)=>s+Number(d.vna||0),0);
    return totalVna>0 ? totalPassed/totalVna*100 : -1;
  };
  if(s==='valid_desc') d.sort((a,b)=>b.valid_pct-a.valid_pct);
  else if(s==='valid_asc') d.sort((a,b)=>a.valid_pct-b.valid_pct);
  else if(s==='ver_desc') d.sort((a,b)=>getVerPct(b)-getVerPct(a));
  else if(s==='ver_asc') d.sort((a,b)=>getVerPct(a)-getVerPct(b));
  else d.sort((a,b)=>Number(a.id)-Number(b.id));
  return d;
}

function fmtDate(ms){
  if(!ms) return '';
  const d=new Date(Number(ms));
  return d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'2-digit'});
}

function render(){
  const data=getFiltered();
  const tot=data.reduce((s,d)=>s+Number(d.total),0);
  const val=data.reduce((s,d)=>s+Number(d.valid),0);
  const inv=data.reduce((s,d)=>s+Number(d.invalid),0);
  const totalReserve=data.reduce((s,d)=>s+Number(d.reserve||0),0);
  const totalAfter1=data.reduce((s,d)=>s+Number(d.after1||0),0);
  const totalAfterWarm=data.reduce((s,d)=>s+Number(d.after_warm||0),0);
  const totalPust=data.reduce((s,d)=>s+Math.max(0,Number(d.invalid||0)-Number(d.after1||0)-Number(d.after_warm||0)),0);
  const farmPct=tot?Math.round(val/tot*1000)/10:0;
  const invPct=tot?Math.round(inv/tot*1000)/10:0;
  const pustPct=tot?Math.round(totalPust/tot*1000)/10:0;
  const after1Pct=tot?Math.round(totalAfter1/tot*1000)/10:0;
  const afterWarmPct=tot?Math.round(totalAfterWarm/tot*1000)/10:0;
  const wv=data.flatMap(d=>d.docs).filter(d=>Number(d.vna)>0);
  const avgVer=wv.length?Math.round(wv.reduce((s,d)=>s+Number(d.success_pct),0)/wv.length*10)/10:0;

  // Doc seller breakdown
  const docStats = {};
  data.forEach(d => {
    (d.docs||[]).forEach(doc => {
      if(!docStats[doc.doc]) docStats[doc.doc] = {passed:0, vna:0};
      docStats[doc.doc].passed += Number(doc.passed||0);
      docStats[doc.doc].vna += Number(doc.vna||0);
    });
  });
  const docRows = Object.entries(docStats)
    .filter(([,v]) => v.vna > 0)
    .sort((a,b) => (b[1].passed/b[1].vna) - (a[1].passed/a[1].vna))
    .map(([doc, v]) => {
      const p = Math.round(v.passed/v.vna*100);
      const clr = p>=80?'#3a7d15':p>=60?'#9a5c08':'#c02020';
      return `<div style="display:flex;justify-content:space-between;font-size:11px;margin-top:3px;"><span style="color:#888780;">${doc}</span><span style="font-weight:500;color:${clr};">${p}% <span style="color:#bbb;font-weight:400;">(${v.vna})</span></span></div>`;
    }).join('');

  document.getElementById('top-metrics').innerHTML=`
    <div class="metric">
      <div class="metric-label">Покупок почт</div>
      <div class="metric-value">${data.length}</div>
    </div>
    <div class="metric">
      <div class="metric-label">Всего почт</div>
      <div class="metric-value">${tot.toLocaleString()}</div>
      <div class="metric-hint" style="margin-top:8px;font-size:13px;">произведено аккаунтов: <span style="font-weight:600;font-size:15px;color:#fff;">${val.toLocaleString()}</span></div>
      ${totalReserve>0?`<div class="metric-hint" style="margin-top:6px;font-size:13px;">в запасе: <span style="font-weight:600;font-size:15px;color:#fff;">${totalReserve.toLocaleString()}</span></div>`:''}
    </div>
    <div class="metric">
      <div class="metric-label">Валидность почт после фарма</div>
      <div class="metric-value">${farmPct}%</div>
      <div class="metric-hint" style="margin-top:4px;">
        потери: ${invPct}%
        ${pustPct>0?`<div style="margin-top:3px;display:flex;justify-content:space-between;"><span>пустышки</span><span style="font-weight:500;">${pustPct}% (${totalPust})</span></div>`:''}
        ${after1Pct>0?`<div style="display:flex;justify-content:space-between;"><span>после 1 логина</span><span style="font-weight:500;">${after1Pct}% (${totalAfter1})</span></div>`:''}
        ${afterWarmPct>0?`<div style="display:flex;justify-content:space-between;"><span>после прогрева</span><span style="font-weight:500;">${afterWarmPct}% (${totalAfterWarm})</span></div>`:''}
      </div>
    </div>
    <div class="metric">
      <div class="metric-label">Прошли верификацию</div>
      <div class="metric-value">${avgVer}%</div>
      <div class="metric-hint" style="margin-bottom:6px;">% аккаунтов прошедших верификацию у баера</div>
      ${docRows}
    </div>`;

  const dc=document.getElementById('filter-doc').value;
  document.getElementById('cards').innerHTML=data.length===0
    ?`<div class="empty-state">Нет данных по выбранным фильтрам</div>`
    :data.map(d=>{
      const visibleDocs=dc?d.docs.filter(x=>x.doc===dc):d.docs;
      const docsHtml=visibleDocs.length?`
        <div class="divider"></div>
        ${visibleDocs.map(doc=>{
          if(doc.vna===0&&doc.not_yet===0) return `<div class="doc-block"><div class="doc-name-row"><span class="doc-name">${doc.doc}</span><span class="doc-no-vna">нет данных</span></div></div>`;
          const passed=Number(doc.passed||0);
          const failed=Number(doc.failed||0);
          const queued_n=Number(doc.queued||0);
          const others_n=Object.values(doc.others||{}).reduce((a,b)=>a+b,0);
          const total_acc=Number(doc.valid||0);
          const total_v=passed+failed+queued_n+others_n;
          const pPass=total_acc?Math.round(passed/total_acc*100):0;
          const pFail=total_acc?Math.round(failed/total_acc*100):0;
          const pQueue=total_acc?Math.round(queued_n/total_acc*100):0;
          const pOther=total_acc?Math.round(others_n/total_acc*100):0;
          const queueTags=doc.queue_counts&&Object.keys(doc.queue_counts).length>0
            ?Object.entries(doc.queue_counts).map(([s,n])=>`<span class="stag stag-queue">${s}: ${n}</span>`).join(''):'';
          const otherTags=doc.others&&Object.keys(doc.others).length>0
            ?Object.entries(doc.others).map(([s,n])=>`<span class="stag stag-other">${s}: ${n}</span>`).join(''):'';
          const verContent=total_acc>0?`
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
              <span class="stage-label">Верификация</span>
              <span class="stage-count">${total_acc} аккаунтов</span>
            </div>
            <div class="stack-bar">
              <div class="stack-seg" style="width:${pPass}%;background:#3a7d15;"></div>
              <div class="stack-seg" style="width:${pFail}%;background:#c02020;"></div>
              <div class="stack-seg" style="width:${pQueue}%;background:#185FA5;"></div>
              <div class="stack-seg" style="width:${pOther}%;background:#534AB7;"></div>
            </div>
            <div class="stack-tags">
              ${passed>0?`<span class="stag stag-pass">прошли: ${passed}</span>`:''}
              ${failed>0?`<span class="stag stag-fail">на замену: ${failed}</span>`:''}
              ${queueTags}
              ${otherTags}
            </div>`
          :`<span class="stage-label">Верификация</span> <span class="stage-count" style="color:#bbb;font-size:11px;">нет данных</span>`;
          return `<div class="doc-block">
            <div class="doc-name-row"><span class="doc-name">${doc.doc}</span></div>
            ${verContent}
          </div>`;
        }).join('')}`
      :`<div class="divider"></div><div class="doc-no-vna">нет данных по верификации</div>`;

      const hasHidden = Number(d.real_total) > Number(d.total);
      const hiddenNote = hasHidden
        ? `<div style="font-size:11px;color:#aaa;margin-top:4px;">всего в закупке: ${d.real_total} — часть на других doc seller или без статуса</div>`
        : '';
      return `<div class="card">
        <div class="card-header">
          <div>
          <div class="card-id">Закупка #${d.id}</div>
          <div class="card-gmail">${d.gmail}${d.date_created_ms?` · <span style="color:#bbb;">${fmtDate(d.date_created_ms)}</span>`:''}</div>
        </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
            <span class="card-badge ${badgeClass(d.valid_pct)}">фарм: ${d.valid_pct}%</span>
            ${(()=>{
              const allPassed=(d.docs||[]).reduce((s,x)=>s+Number(x.passed||0),0);
              const allVna=(d.docs||[]).reduce((s,x)=>s+Number(x.vna||0),0);
              if(allVna===0) return '';
              const vp=Math.round(allPassed/allVna*100);
              const clr=vp>=80?'#2d6010':vp>=60?'#7a4a08':'#8f2020';
              const bg=vp>=80?'#E3F3D5':vp>=60?'#FEF0D8':'#FDEAEA';
              const docLines=(d.docs||[])
                .filter(x=>Number(x.vna||0)>0)
                .map(x=>{
                  const p=Math.round(Number(x.passed||0)/Number(x.vna)*100);
                  return `${x.doc}: ${p}% (${x.vna} акк.)`;
                }).join('&#10;');
              return `<span style="font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:${bg};color:${clr};cursor:default;"
                title="${docLines}">вериф: ${vp}%</span>`;
            })()}
          </div>
        </div>
        <div class="farm-section">
          <div class="farm-label-row">
            <span class="farm-label">Валидных почт с фарма</span>
            <span class="farm-counts">${d.valid} из ${d.total}</span>
          </div>
          <div class="bar-bg"><div class="bar-fill" style="width:${d.valid_pct}%;background:${farmColor(d.valid_pct)};"></div></div>
          ${hiddenNote}
        </div>
        ${docsHtml}
        <div class="card-comment" id="comment-wrap-${d.id}">
          <div onclick="toggleComment('${d.id}')" style="display:flex;align-items:center;gap:6px;cursor:pointer;margin-top:2px;">
            <span class="comment-label" style="margin:0;">Комментарий</span>
            <span id="comment-arrow-${d.id}" style="font-size:10px;color:#bbb;">▶</span>
            <span id="comment-preview-${d.id}" style="font-size:12px;color:#aaa;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
          </div>
          <div id="comment-body-${d.id}" style="display:none;margin-top:6px;">
            <textarea
              class="comment-input"
              id="comment_${d.id}"
              placeholder="Добавить заметку по закупке..."
              onchange="saveComment('${d.id}', this.value)"
              oninput="saveComment('${d.id}', this.value)"
              style="min-height:50px;"
            ></textarea>
            <div class="comment-saved" id="saved_${d.id}">Сохранено</div>
          </div>
        </div>
      </div>`;
    }).join('');

  const docs=['1-k1','3-lod','Fels'];
  data.forEach(d => {
    const ta = document.getElementById('comment_' + d.id);
    const saved = loadComment(d.id);
    if (ta) ta.value = saved;
    const preview = document.getElementById('comment-preview-' + d.id);
    if (preview && saved) preview.textContent = saved;
  });

  document.getElementById('heatmap').innerHTML=`
    <thead><tr>
      <th>ID</th><th>Gmail Seller</th><th>Валид. почт</th>
      ${docs.map(d=>`<th>${d}</th>`).join('')}
    </tr></thead>
    <tbody>${data.map(d=>{
      const cells=docs.map(doc=>{
        const f=d.docs.find(x=>x.doc===doc);
        if(!f||f.vna===0) return `<td style="background:#f7f7f5;color:#ccc;">—</td>`;
        const c=verBg(f.success_pct);
        const bans=f.bans||{};
        const banKeys=Object.keys(bans);
        let tooltipRows='';
        if(f.failed>0){
          tooltipRows+=`<div style="color:#aaa;margin-bottom:3px;">на замену: ${f.failed} акк.</div>`;
          if(banKeys.length>0){
            tooltipRows+=banKeys.map(k=>`<div><span style="color:#aaa;">${k}:</span> ${bans[k].n} (${bans[k].pct}%)</div>`).join('');
          } else {
            tooltipRows+=`<div style="color:#aaa;font-style:italic;">причины не указаны</div>`;
          }
        } else {
          tooltipRows=`<div style="color:#9FE1CB;">все прошли верификацию</div>`;
        }
        const tooltip=`<div class="tooltip"><div style="font-weight:600;margin-bottom:4px;">${doc} #${d.id}</div><div style="color:#aaa;margin-bottom:4px;">прошли: ${f.passed} / ${f.vna}</div>${tooltipRows}</div>`;
        const banRows = Object.entries(f.bans||{}).map(([k,v])=>[k, v.n+' ('+v.pct+'%)']);
        const allRows = [
          ['прошли', f.passed],
          ['на замену', f.failed],
          ['всего', f.vna],
          ...banRows
        ];
        const dataAttr = encodeURIComponent(JSON.stringify({title: doc+' #'+d.id, rows: allRows}));
        return `<td class="hm-cell" style="background:${c.bg};color:${c.c};cursor:pointer;"
          onmouseenter="const p=JSON.parse(decodeURIComponent('${dataAttr}'));showHmPopup(event,p.title,p.rows)"
          onmouseleave="hideHmPopup()"
        >${f.success_pct}%</td>`;
      }).join('');
      return `<tr>
        <td class="id-cell">#${d.id}</td>
        <td class="gmail-cell">${d.gmail}</td>
        <td class="farm-cell" style="color:${farmColor(d.valid_pct)};">${d.valid_pct}%</td>
        ${cells}
      </tr>`;
    }).join('')}</tbody>`;
}

const gmails=[...new Set(DATA.map(d=>d.gmail))].sort();

gmails.forEach(g=>{const o=document.createElement('option');o.value=g;o.textContent=g;sel.appendChild(o);});

const dsel=document.getElementById('filter-doc');
allDocs.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;dsel.appendChild(o);});

render();

// BUYERS
function verCol(p){return p>=80?'#3a7d15':p>=60?'#9a5c08':'#c02020';}

function renderBuyers(){
  const data=BUYERS_DATA;
  if(!data||data.length===0){
    document.getElementById('buyer-cards').innerHTML='<div class="empty-state">Нет данных — запустите скрипт обновления</div>';
    return;
  }
  const bfilter = document.getElementById('buyer-filter') ? document.getElementById('buyer-filter').value : '';
  const filteredData = bfilter ? data.filter(b=>b.buyer===bfilter) : data;

  const totAccounts=filteredData.reduce((s,b)=>s+b.total,0);
  const totPassed=filteredData.reduce((s,b)=>s+b.passed,0);
  const totFailed=filteredData.reduce((s,b)=>s+b.failed,0);
  const totQueued=filteredData.reduce((s,b)=>s+b.queued,0);
  const totVna=filteredData.reduce((s,b)=>s+b.vna,0);
  const avgPct=totVna>0?Math.round(totPassed/totVna*100):0;

  document.getElementById('buyers-metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Аккаунтов выдано</div><div class="metric-value">${totAccounts.toLocaleString()}</div></div>
    <div class="metric">
      <div class="metric-label">Верификация</div>
      <div class="metric-value" style="color:${verCol(avgPct)}">${avgPct}%</div>
      <div class="metric-hint" style="margin-top:4px;">
        из <b>${totVna.toLocaleString()}</b> дошедших до верификации
        <div style="margin-top:4px;display:flex;justify-content:space-between;"><span>прошли</span><span style="font-weight:500;">${totPassed}</span></div>
        <div style="display:flex;justify-content:space-between;"><span>на замену</span><span style="font-weight:500;">${totFailed}</span></div>
        <div style="display:flex;justify-content:space-between;"><span>в очереди</span><span style="font-weight:500;">${totQueued}</span></div>
        <div style="display:flex;justify-content:space-between;color:#bbb;"><span>ещё не верифицированы</span><span style="font-weight:500;">${totAccounts-totVna-totQueued}</span></div>
      </div>
    </div>
    <div class="metric">
      <div class="metric-label">На замену</div>
      <div class="metric-value" style="color:#c02020">${totFailed}</div>
      <div class="metric-hint" style="margin-top:4px;">${totVna>0?Math.round(totFailed/totVna*100):0}% от дошедших до верификации</div>
    </div>`;
  document.getElementById('buyer-cards').innerHTML=filteredData.map(b=>{
    const t=b.total;
    const pPass=t>0?Math.round(b.passed/t*100):0;
    const pFail=t>0?Math.round(b.failed/t*100):0;
    const pQueue=t>0?Math.round(b.queued/t*100):0;
    const pOther=t>0?Math.round((b.others+b.no_status)/t*100):0;
    const clr=verCol(b.success_pct);
    const docRows=(b.by_doc||[]).map(d=>{
      const dc=verCol(d.success_pct);
      const banEntries=Object.entries(d.bans||{});
      const banTip=banEntries.length?banEntries.map(([k,v])=>k+': '+v).join(' | '):'нет данных';
      const failedTag=d.failed>0?`<span class="stag stag-fail" style="cursor:default;position:relative;" title="${banTip}">замена: ${d.failed} ⓘ</span>`:'';
      return `<div class="buyer-doc-row">
        <span class="buyer-doc-name">${d.doc}</span>
        <span style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          ${d.passed>0?`<span class="stag stag-pass">прошли: ${d.passed}</span>`:''}
          ${failedTag}
          ${d.queued>0?`<span class="stag stag-queue">очередь: ${d.queued}</span>`:''}
          ${d.vna>0?`<span style="font-weight:600;color:${dc};min-width:40px;text-align:right;">${d.success_pct}%</span>`:''}
        </span>
      </div>`;
    }).join('');
    const gmailRows=(b.by_gmail||[]).filter(g=>g.vna>0).slice(0,5).map(g=>{
      const gc=verCol(g.success_pct);
      return `<div class="buyer-doc-row">
        <span class="buyer-doc-name" style="font-weight:500;">${g.gmail}</span>
        <span style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:11px;color:#aaa;">${g.vna} акк.</span>
          <span style="font-weight:600;color:${gc};">${g.success_pct}%</span>
        </span>
      </div>`;
    }).join('');
    return `<div class="buyer-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;">
        <div class="buyer-name">${b.buyer}</div>
        <span class="buyer-pct" style="color:${clr}">${b.success_pct}%</span>
      </div>
      <div class="buyer-total">${t} аккаунтов выдано</div>
      <div class="buyer-stack">
        <div style="width:${pPass}%;background:#3a7d15;"></div>
        <div style="width:${pFail}%;background:#c02020;"></div>
        <div style="width:${pQueue}%;background:#185FA5;"></div>
        <div style="width:${pOther}%;background:#534AB7;"></div>
      </div>
      <div class="buyer-tags">
        ${b.passed>0?`<span class="stag stag-pass">прошли: ${b.passed}</span>`:''}
        ${b.failed>0?(()=>{
          const allBans={};
          (b.by_doc||[]).forEach(d=>Object.entries(d.bans||{}).forEach(([k,v])=>{allBans[k]=(allBans[k]||0)+(typeof v==='object'?v.n:v);}));
          const banEntries=Object.entries(allBans).sort((a,b2)=>b2[1]-a[1]);
          const tipRows=banEntries.length?banEntries.map(([k,v])=>`<div><span style="color:#aaa;">${k}:</span> ${v}</div>`).join(''):'<div style="color:#aaa;">нет данных</div>';
          return `<span class="stag stag-fail stag-with-tip">на замену: ${b.failed} ⓘ<span class="stag-tip"><div style="font-weight:600;color:#d47070;margin-bottom:4px;">Причины замен</div>${tipRows}</span></span>`;
        })():''}
        ${b.queued>0?(()=>{
          const QUEUE_ST=['READY TO WORK','Review','В процессе верификации','НА ВЕРИФ','Business Verification'];
          const sc=b.status_counts||{};
          const qEntries=Object.entries(sc).filter(([k])=>QUEUE_ST.map(s=>s.toUpperCase()).includes(k.trim().toUpperCase())).sort((a,b2)=>b2[1]-a[1]);
          const tipRows=qEntries.length?qEntries.map(([k,v])=>`<div><span style="color:#aaa;">${k}:</span> ${v}</div>`).join(''):'<div style="color:#aaa;">нет данных</div>';
          return `<span class="stag stag-queue stag-with-tip">в очереди: ${b.queued} ⓘ<span class="stag-tip"><div style="font-weight:600;color:#4a9fd4;margin-bottom:4px;">Статусы в очереди</div>${tipRows}</span></span>`;
        })():''}
        ${b.others>0?(()=>{
          const QUEUE_ST=['READY TO WORK','Review','В процессе верификации','НА ВЕРИФ','Business Verification'];
          const VERIFIED_ST=['ACTIVE','APPEAL SUCCESSFUL  ПП/Unpaid/БизВериф','Active/Pause','END-1. Перевязать карту перед удалением','END-2. Средства выведены/Карта отвязана','End-3 Перевязать карту но оставить на этом же статусе','FREEZE'];
          const sc=b.status_counts||{};
          const allKnown=new Set([...QUEUE_ST.map(s=>s.toUpperCase()),...VERIFIED_ST.map(s=>s.toUpperCase()),'НА ЗАМЕНУ']);
          const oEntries=Object.entries(sc).filter(([k])=>!allKnown.has(k.trim().toUpperCase())).sort((a,b2)=>b2[1]-a[1]);
          const tipRows=oEntries.length?oEntries.map(([k,v])=>`<div><span style="color:#aaa;">${k}:</span> ${v}</div>`).join(''):'<div style="color:#aaa;">нет данных</div>';
          return `<span class="stag stag-other stag-with-tip">прочие: ${b.others} ⓘ<span class="stag-tip"><div style="font-weight:600;color:#8a82d4;margin-bottom:4px;">Прочие статусы</div>${tipRows}</span></span>`;
        })():''}
      </div>
      ${docRows?`<div class="divider"></div>${docRows}`:''}
      ${gmailRows?`
        <div style="margin-top:10px;">
          <div style="font-size:11px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;">Лучшие почты для заказа</div>
          ${gmailRows}
        </div>`:''}
    </div>`;
  }).join('');
}

// TABS
function switchTab(name){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',['purchases','buyers'][i]===name);
  });
  document.getElementById('tab-purchases').classList.toggle('active',name==='purchases');
  document.getElementById('tab-buyers').classList.toggle('active',name==='buyers');
  if(name==='buyers') renderBuyers();
}

// Заполняем фильтр баеров
(function(){
  const sel = document.getElementById('buyer-filter');
  if(!sel) return;
  BUYERS_DATA.forEach(b=>{
    const o = document.createElement('option');
    o.value = b.buyer; o.textContent = b.buyer;
    sel.appendChild(o);
  });
})();
renderBuyers();
</script>

<button id="theme-toggle" onclick="toggleTheme()" style="position:fixed;top:16px;right:16px;z-index:999;background:#1a1a1a;color:#fff;border:1px solid #444;border-radius:20px;padding:6px 14px;font-size:13px;font-family:inherit;cursor:pointer;">Тёмная</button>
<script>
function toggleTheme(){const s=document.getElementById('dark-theme');const b=document.getElementById('theme-toggle');const d=!s.disabled;s.disabled=d;b.textContent=d?'Тёмная':'Светлая';b.style.background=d?'#1a1a1a':'#fff';b.style.color=d?'#fff':'#1a1a1a';try{localStorage.setItem('theme',d?'light':'dark')}catch(e){}}
try{if(localStorage.getItem('theme')==='dark'){document.getElementById('dark-theme').disabled=false;const b=document.getElementById('theme-toggle');b.textContent='Светлая';b.style.background='#fff';b.style.color='#1a1a1a';}}catch(e){}
</script>

<div id="hm-popup" class="hm-popup">
  <div class="hm-popup-title" id="hm-popup-title"></div>
  <div id="hm-popup-body"></div>
</div>

<script>
let popupTimeout;
function showHmPopup(e, title, rows) {
  const popup = document.getElementById('hm-popup');
  const t = document.getElementById('hm-popup-title');
  const b = document.getElementById('hm-popup-body');
  t.textContent = title;
  b.innerHTML = rows.map(r => `<div class="hm-popup-row"><span class="hm-popup-label">${r[0]}</span><span class="hm-popup-val">${r[1]}</span></div>`).join('');

  // Position
  const rect = e.target.getBoundingClientRect();
  const scrollY = window.scrollY || document.documentElement.scrollTop;
  const scrollX = window.scrollX || document.documentElement.scrollLeft;
  popup.style.top = (rect.bottom + scrollY + 6) + 'px';
  let left = rect.left + scrollX;
  popup.classList.add('visible');
  // Keep in viewport
  const pw = popup.offsetWidth;
  if (left + pw > window.innerWidth - 16) left = window.innerWidth - pw - 16 + scrollX;
  popup.style.left = left + 'px';

  clearTimeout(popupTimeout);
}
function hideHmPopup() {
  popupTimeout = setTimeout(() => {
    document.getElementById('hm-popup').classList.remove('visible');
  }, 200);
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.hm-cell') && !e.target.closest('#hm-popup')) {
    document.getElementById('hm-popup').classList.remove('visible');
  }
});
</script>
