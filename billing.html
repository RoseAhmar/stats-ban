<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Расчёт с баерами</title>
<style>
  :root {
    --bg: #1a1917;
    --card: #232220;
    --card2: #2a2826;
    --border: #333230;
    --text: #e8e6e2;
    --muted: #888780;
    --accent: #d4944a;
    --green: #4caf7d;
    --red: #e05c5c;
    --blue: #5c9ce0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; }

  .page-wrap {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 24px;
  }

  .top-bar {
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .back-link {
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    transition: color .15s, border-color .15s;
  }
  .back-link:hover { color: var(--text); border-color: var(--muted); }
  .page-title { font-size: 20px; font-weight: 700; }
  .page-subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .period-bar {
    padding: 16px 0;
    display: flex;
    gap: 8px;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .period-btn {
    padding: 6px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    transition: all .15s;
  }
  .period-btn:hover { color: var(--text); border-color: var(--muted); }
  .period-btn.active { background: var(--card2); color: var(--text); border-color: #555; font-weight: 600; }

  .main { padding: 20px 0; }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .sum-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
  }
  .sum-label { font-size: 11px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .sum-value { font-size: 28px; font-weight: 700; }
  .sum-value.money { color: var(--green); }
  .sum-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

  .section-label {
    font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 14px;
  }

  .buyers-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }

  .buyer-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .buyer-header {
    padding: 14px 16px 10px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    border-bottom: 1px solid var(--border);
  }
  .buyer-name { font-size: 15px; font-weight: 700; }
  .buyer-amount { font-size: 18px; font-weight: 700; color: var(--green); }
  .buyer-amount-label { font-size: 11px; color: var(--muted); text-align: right; margin-top: 1px; }

  .buyer-body { padding: 12px 16px; }

  .daily-scroll {
    max-height: 200px;
    overflow-y: auto;
    margin-bottom: 10px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .daily-scroll::-webkit-scrollbar { width: 4px; }
  .daily-scroll::-webkit-scrollbar-track { background: transparent; }
  .daily-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .daily-table { width: 100%; border-collapse: collapse; }
  .daily-table th {
    font-size: 10px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase;
    color: var(--muted); text-align: left; padding: 0 0 6px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--card);
  }
  .daily-table th:last-child { text-align: right; }
  .daily-table td { padding: 5px 0; font-size: 13px; border-bottom: 1px solid #2a2826; }
  .daily-table td:last-child { text-align: right; font-weight: 600; }
  .daily-table tr:last-child td { border-bottom: none; }
  .date-cell { color: var(--muted); }
  .count-cell { color: var(--text); }

  .buyer-totals {
    border-top: 1px solid var(--border);
    padding-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .total-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--muted);
  }
  .total-row.final {
    color: var(--text);
    font-weight: 600;
    font-size: 14px;
    margin-top: 4px;
    padding-top: 6px;
    border-top: 1px solid var(--border);
  }
  .vitfarm-badge {
    display: inline-block;
    background: rgba(92,156,224,.12);
    border: 1px solid rgba(92,156,224,.3);
    color: #5c9ce0;
    padding: 1px 7px; border-radius: 4px; font-size: 12px; font-weight: 600;
  }
  .zamena-badge {
    display: inline-block;
    background: #3a2a18;
    border: 1px solid #5a3e20;
    color: var(--accent);
    font-size: 11px;
    padding: 1px 7px;
    border-radius: 4px;
    font-weight: 600;
  }
  .price-note {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    margin-top: 2px;
  }

  /* VIEW TABS */
  .view-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
  }
  .view-tab {
    padding: 6px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    transition: all .15s;
  }
  .view-tab:hover { color: var(--text); border-color: var(--muted); }
  .view-tab.active { background: var(--card2); color: var(--text); border-color: #555; font-weight: 600; }

  /* DAILY VIEW */
  .dates-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }
  .date-pill {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    transition: all .15s;
  }
  .date-pill:hover { border-color: var(--accent); color: var(--text); }
  .date-pill.active { border-color: var(--accent); background: #2a1e0e; color: var(--accent); font-weight: 600; }

  .day-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .day-table th {
    font-size: 11px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
    color: var(--muted); text-align: left; padding: 10px 16px;
    border-bottom: 1px solid var(--border); background: var(--card2);
  }
  .day-table th:last-child, .day-table td:last-child { text-align: right; }
  .day-table td { padding: 10px 16px; font-size: 14px; border-bottom: 1px solid #2a2826; }
  .day-table tr:last-child td { border-bottom: none; }
  .day-table tr:hover td { background: #2a2826; }
  .day-total-row td { font-weight: 700; background: var(--card2); border-top: 1px solid var(--border); color: var(--text); }
  .day-amount { color: var(--green); font-weight: 600; }

  /* COST STATS */
  .cost-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 20px;
  }
  .cost-section-title {
    font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 14px;
  }
  .cost-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .cost-card {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
  }
  .cost-card-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
  .cost-card-value { font-size: 24px; font-weight: 700; color: var(--accent); }
  .cost-card-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }

  /* MB TEAM VIEW */
  .team-section { margin-bottom: 28px; }
  .team-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 14px;
  }
  .team-header-name { font-size: 14px; font-weight: 700; color: var(--accent); }
  .team-header-stats { display: flex; gap: 20px; font-size: 12px; color: var(--muted); }
  .team-header-stats span { color: var(--text); font-weight: 600; }
</style>
</head>

</div>

// ── WEEKLY VIEW ───────────────────────────────────────────────────────────────

// Returns Monday of the ISO week for a "YYYY-MM-DD" string
function isoWeekMonday(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const day = d.getDay() || 7; // 1=Mon … 7=Sun
  d.setDate(d.getDate() - day + 1);
  return d.toISOString().slice(0, 10);
}

function addDays(dateStr, n) {
  const d = new Date(dateStr + 'T12:00:00');
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0, 10);
}

// Returns all dates (YYYY-MM-DD) in [monStr … monStr+6]
function weekDates(monStr) {
  const out = [];
  for (let i = 0; i < 7; i++) out.push(addDays(monStr, i));
  return out;
}

// "2026-04-06" → "6"
function dayNum(dateStr) { return parseInt(dateStr.slice(8)); }

// Pill label: "6–12 апр." or "1–5 апр."
function weekLabel(monStr, allDates) {
  const datesInWeek = weekDates(monStr).filter(d => allDates.has(d));
  if (!datesInWeek.length) return '';
  const first = datesInWeek[0], last = datesInWeek[datesInWeek.length - 1];
  const mm = first.slice(5, 7);
  const shortMonth = { '01':'янв','02':'фев','03':'мар','04':'апр','05':'май',
    '06':'июн','07':'июл','08':'авг','09':'сен','10':'окт','11':'ноя','12':'дек' };
  const mon = shortMonth[mm] || mm;
  if (first === last) return `${dayNum(first)} ${mon}.`;
  return `${dayNum(first)}–${dayNum(last)} ${mon}.`;
}

let activeWeek = null;

function renderWeekly() {
  const data = activePeriod === 'mar' ? BILLING_MAR : activePeriod === 'apr' ? BILLING_APR : BILLING_MAY;

  // Collect all dates present in data
  const dateSet = new Set();
  data.forEach(b => b.daily.forEach(d => dateSet.add(d.date)));
  const allDates = Array.from(dateSet).sort();

  // Group dates by their ISO-week Monday
  const weekSet = new Set(allDates.map(isoWeekMonday));
  const weeks = Array.from(weekSet).sort();

  // Default to last week
  if (!activeWeek || !weeks.includes(activeWeek)) {
    activeWeek = weeks[weeks.length - 1] || null;
  }

  document.getElementById('weeks-list').innerHTML = weeks.map(w =>
    `<div class="date-pill ${w === activeWeek ? 'active' : ''}" onclick="selectWeek('${w}')">${weekLabel(w, dateSet)}</div>`
  ).join('');

  renderWeekDetail(data, activeWeek, dateSet);
}

function selectWeek(mon) {
  activeWeek = mon;
  renderWeekly();
}

  const rows = [];
  data.forEach(b => {
    const zamDailyMap = {};
    (b.zamena_daily || []).forEach(z => { zamDailyMap[z.date] = z.count; });

    let total = 0, zamenas = 0;
    daysInWeek.forEach(d => {
      const entry = b.daily.find(x => x.date === d);
      if (entry) {
        total += entry.count;
        zamenas += zamDailyMap[d] || 0;
      }
    });
    if (total === 0) return;
    const paid = total - zamenas;
    rows.push({ buyer: b.buyer, total, zamenas, paid });
  });

  if (!rows.length) { el.innerHTML = `<div style="color:var(--muted);padding:20px 0">Нет данных за эту неделю</div>`; return; }

  rows.sort((a, b) => b.total - a.total);
  const totAcc  = rows.reduce((s, r) => s + r.total,   0);
  const totZam  = rows.reduce((s, r) => s + r.zamenas, 0);
  const totPaid = rows.reduce((s, r) => s + r.paid,    0);
  const label   = weekLabel(monStr, new Set(daysInWeek));

  // Day-by-day breakdown table per buyer (collapsible would be complex; show flat)
  // Also show a mini day breakdown below the buyer table
  const dayBreakdownRows = daysInWeek.map(d => {
    let dayTotal = 0, dayZam = 0;
    data.forEach(b => {
      const entry = b.daily.find(x => x.date === d);
      if (entry) {
        dayTotal += entry.count;
        const zm = (b.zamena_daily || []).find(z => z.date === d);
        dayZam += zm ? zm.count : 0;
      }
    });
    if (dayTotal === 0) return '';
    const dayPaid = dayTotal - dayZam;
    const countCell = dayZam > 0
      ? `${dayPaid} акк. + <span style="color:var(--text)">${dayZam} замен</span> <span style="color:var(--muted)">(${dayTotal})</span>`
      : `${dayTotal}`;
    return `<tr>
      <td>${fmtDate(d)}</td>
      <td style="text-align:right;font-weight:600">${countCell}</td>
      <td style="text-align:right" class="day-amount">${fmtMoney(dayPaid * PRICE_PER_ACCOUNT)}</td>
    </tr>`;
  }).filter(Boolean).join('');

  el.innerHTML = `
    <table class="day-table" style="margin-bottom:16px">
      <thead>
        <tr>
          <th>Баер</th>
          <th style="text-align:right">Аккаунтов</th>
          <th style="text-align:right">Сумма (×$${PRICE_PER_ACCOUNT})</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map(r => {
          const countCell = r.zamenas > 0
            ? `${r.paid} акк. + <span style="color:var(--text)">${r.zamenas} замен</span> <span style="color:var(--muted)">(${r.total})</span>`
            : `${r.total}`;
          return `<tr>
            <td>${r.buyer}</td>
            <td style="text-align:right;font-weight:600">${countCell}</td>
            <td style="text-align:right" class="day-amount">${fmtMoney(r.paid * PRICE_PER_ACCOUNT)}</td>
          </tr>`;
        }).join('')}
        <tr class="day-total-row">
          <td>Итого за ${label}</td>
          <td style="text-align:right">${totZam > 0 ? `${totPaid} + <span style="color:var(--text)">${totZam} замен</span> (${totAcc})` : totAcc}</td>
          <td style="text-align:right" class="day-amount">${fmtMoney(totPaid * PRICE_PER_ACCOUNT)}</td>
        </tr>
      </tbody>
    </table>

    <div class="section-label" style="margin-bottom:10px">По дням недели</div>
    <table class="day-table">
      <thead>
        <tr>
          <th>День</th>
          <th style="text-align:right">Аккаунтов</th>
          <th style="text-align:right">Сумма</th>
        </tr>
      </thead>
      <tbody>${dayBreakdownRows}</tbody>
    </table>`;
}

let activeMBTeamWeek = null; // null = все недели

function renderMBTeam() {
  const data = activePeriod === 'mar' ? BILLING_MAR : activePeriod === 'apr' ? BILLING_APR : BILLING_MAY;

  // Collect all dates → compute weeks for pills
  const dateSet = new Set();
  data.forEach(b => b.daily.forEach(d => dateSet.add(d.date)));
  const weekSet = new Set(Array.from(dateSet).map(isoWeekMonday));
  const weeks = Array.from(weekSet).sort();

  // Reset invalid week
  if (activeMBTeamWeek && !weeks.includes(activeMBTeamWeek)) activeMBTeamWeek = null;

  // Determine which dates are "active" (null = all)
  const activeDates = activeMBTeamWeek
    ? new Set(weekDates(activeMBTeamWeek).filter(d => dateSet.has(d)))
    : dateSet;

  // Render week pills
  document.getElementById('mbteam-weeks-list').innerHTML =
    `<div class="date-pill ${activeMBTeamWeek === null ? 'active' : ''}" onclick="selectMBTeamWeek(null)">Весь период</div>` +
    weeks.map(w =>
      `<div class="date-pill ${w === activeMBTeamWeek ? 'active' : ''}" onclick="selectMBTeamWeek('${w}')">${weekLabel(w, dateSet)}</div>`
    ).join('');

  // Group buyers by mb_team
  const teamMap = {};
  data.forEach(b => {
    const team = b.mb_team || '—';
    if (!teamMap[team]) teamMap[team] = [];
    teamMap[team].push(b);
  });

  const teamNames = Object.keys(teamMap).sort((a, b) => {
    if (a === '—') return 1;
    if (b === '—') return -1;
    return a.localeCompare(b);
  });

  document.getElementById('mbteam-content').innerHTML = teamNames.map(team => {
    const buyers = teamMap[team];

    // Build buyer cards with stats filtered to activeDates
    let teamAcc = 0, teamZam = 0, teamPaid = 0, teamAmt = 0;

    const cards = buyers.map(b => {
      const zamDailyMap = {};
      (b.zamena_daily || []).forEach(z => { zamDailyMap[z.date] = z.count; });

      // Filter daily rows to activeDates
      const filteredDaily = b.daily.filter(d => activeDates.has(d.date));
      if (!filteredDaily.length) return '';

      const vitDailyMapMB = {};
      (b.vitfarm_daily || []).forEach(v => { vitDailyMapMB[v.date] = v.count; });
      const total    = filteredDaily.reduce((s, d) => s + d.count, 0);
      const zamenas  = filteredDaily.reduce((s, d) => s + (zamDailyMap[d.date] || 0), 0);
      const vitfarmMB = filteredDaily.reduce((s, d) => s + (vitDailyMapMB[d.date] || 0), 0);
      const paid     = total - zamenas - vitfarmMB;
      const amount   = paid * PRICE_PER_ACCOUNT;

      teamAcc  += total;
      teamZam  += zamenas;
      teamPaid += paid;
      // vitfarmMB tracked per buyer but not summed to team total separately
      teamAmt  += amount;

      const dailyRows = filteredDaily.map(d => {
        const z = zamDailyMap[d.date] || 0;
        const vf = vitDailyMapMB[d.date] || 0;
        let countCell;
        if (z > 0 && vf > 0) {
          countCell = `${d.count - z - vf} акк. + <span style="color:var(--text)">${z} замен</span> + <span style="color:#5c9ce0">${vf} VF</span> <span style="color:var(--muted)">(${d.count})</span>`;
        } else if (z > 0) {
          countCell = `${d.count - z} акк. + <span style="color:var(--text)">${z} замен</span> <span style="color:var(--muted)">(${d.count})</span>`;
        } else if (vf > 0) {
          countCell = `${d.count - vf} акк. + <span style="color:#5c9ce0">${vf} VF</span> <span style="color:var(--muted)">(${d.count})</span>`;
        } else {
          countCell = `${d.count} акк.`;
        }
        return `<tr>
          <td class="date-cell">${fmtDate(d.date)}</td>
          <td class="count-cell">${countCell}</td>
        </tr>`;
      }).join('');

      const zamenaLine = zamenas > 0
        ? `<div class="total-row">
             <span>из них замены <span class="zamena-badge">${zamenas}</span> — бесплатно</span>
             <span style="color:var(--green)">$0</span>
           </div>`
        : '';
      const vitfarmLineMB = vitfarmMB > 0
        ? `<div class="total-row">
             <span>VitFarm Free <span class="vitfarm-badge">${vitfarmMB}</span></span>
             <span style="color:#5c9ce0">$0</span>
           </div>`
        : '';

      return `
        <div class="buyer-card">
          <div class="buyer-header">
            <div><div class="buyer-name">${b.buyer}</div></div>
            <div style="text-align:right">
              <div class="buyer-amount">${fmtMoney(amount)}</div>
              <div class="buyer-amount-label">${paid} × $${PRICE_PER_ACCOUNT}</div>
            </div>
          </div>
          <div class="buyer-body">
            <div class="daily-scroll">
              <table class="daily-table">
                <thead><tr><th>Дата выдачи</th><th style="text-align:right">Аккаунты</th></tr></thead>
                <tbody>${dailyRows}</tbody>
              </table>
            </div>
            <div class="buyer-totals">
              <div class="total-row"><span>Всего выдано</span><span>${total} акк.</span></div>
              ${zamenaLine}
              ${vitfarmLineMB}
              <div class="total-row final">
                <span>Итого к оплате</span>
                <span><strong>${paid}</strong> × $${PRICE_PER_ACCOUNT} = <span style="color:var(--green)">${fmtMoney(amount)}</span></span>
              </div>
            </div>
          </div>
        </div>`;
    }).filter(Boolean).join('');

    if (!cards) return ''; // skip team if no buyers have data in this week

    return `
      <div class="team-section">
        <div class="team-header">
          <div class="team-header-name">${team}</div>
          <div class="team-header-stats">
            <div>Выдано: <span>${teamAcc.toLocaleString()}</span></div>
            ${teamZam > 0 ? `<div>Замен: <span>${teamZam.toLocaleString()}</span></div>` : ''}
            <div>К оплате: <span>${teamPaid.toLocaleString()}</span></div>
            <div>Сумма: <span style="color:var(--green)">${fmtMoney(teamAmt)}</span></div>
          </div>
        </div>
        <div class="buyers-grid">${cards}</div>
      </div>`;
  }).filter(Boolean).join('');
}

function selectMBTeamWeek(mon) {
  activeMBTeamWeek = mon;
  renderMBTeam();
}

function renderDaily() {
  const data = activePeriod === 'mar' ? BILLING_MAR : activePeriod === 'apr' ? BILLING_APR : BILLING_MAY;

  // Собираем все уникальные даты
  const dateSet = new Set();
  data.forEach(b => b.daily.forEach(d => dateSet.add(d.date)));
  const dates = Array.from(dateSet).sort();

  // Выбираем последнюю дату по умолчанию
  if (!activeDate || !dates.includes(activeDate)) {
    activeDate = dates[dates.length - 1] || null;
  }

  // Рисуем пилюли дат
  document.getElementById('dates-list').innerHTML = dates.map(d =>
    `<div class="date-pill ${d === activeDate ? 'active' : ''}" onclick="selectDate('${d}')">${fmtDate(d)}</div>`
  ).join('');

  renderDayDetail(data, activeDate);
}

function selectDate(date) {
  activeDate = date;
  renderDaily();
}

function renderDayDetail(data, date) {
  if (!date) { document.getElementById('day-detail').innerHTML = ''; return; }

  // Собираем строки: баер, кол-во, замены в этот день, платные, сумма
  const rows = [];
  data.forEach(b => {
    const dayEntry = b.daily.find(d => d.date === date);
    if (!dayEntry) return;
    const total = dayEntry.count;
    const zamEntry = (b.zamena_daily || []).find(z => z.date === date);
    const zamenas = zamEntry ? zamEntry.count : 0;
    const paid = total - zamenas;
    const agEntry = (b.agency_daily || []).find(a => a.date === date);
    const agencies = agEntry ? agEntry.agencies : {};
    rows.push({ buyer: b.buyer, mb_team: b.mb_team || '', total, zamenas, paid, agencies });
  });

  if (rows.length === 0) {
    document.getElementById('day-detail').innerHTML = `<div style="color:var(--muted);padding:20px 0;">Нет данных за эту дату</div>`;
    return;
  }

  rows.sort((a, b) => b.total - a.total);
  const totalCount = rows.reduce((s, r) => s + r.total, 0);
  const totalZamenas = rows.reduce((s, r) => s + r.zamenas, 0);
  const totalPaid = rows.reduce((s, r) => s + r.paid, 0);

  document.getElementById('day-detail').innerHTML = `
    <table class="day-table">
      <thead>
        <tr>
          <th>Баер</th>
          <th style="text-align:right">Аккаунтов</th>
          <th style="text-align:right">Сумма (×$${PRICE_PER_ACCOUNT})</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map(r => {
          const countCell = r.zamenas > 0
            ? `${r.paid} акк. + <span style="color:var(--text)">${r.zamenas} замен</span> <span style="color:var(--muted)">(${r.total})</span>`
            : `${r.total} акк.`;
          const teamBadge = r.mb_team && r.mb_team !== '—'
            ? ` <span style="font-size:11px;color:var(--muted);font-weight:400">${r.mb_team}</span>`
            : '';
          const agParts = Object.entries(r.agencies || {})
            .sort((a, b) => b[1] - a[1])
            .map(([ag, n]) => {
              if (ag === 'VitFarm(Free)') return `<span style="color:var(--blue)">${ag}: ${n}</span>`;
              if (ag === 'VitFarm') return `<span style="color:var(--accent)">${ag}: ${n}</span>`;
              return `<span>${ag}: ${n}</span>`;
            }).join('<span style="color:var(--border)"> · </span>');
          const agLine = agParts ? `<div style="font-size:11px;color:var(--muted);margin-top:3px">${agParts}</div>` : '';
          return `<tr>
            <td>${r.buyer}${teamBadge}</td>
            <td style="text-align:right;font-weight:600">${countCell}${agLine}</td>
            <td style="text-align:right" class="day-amount">${fmtMoney(r.paid * PRICE_PER_ACCOUNT)}</td>
          </tr>`;
        }).join('')}
        <tr class="day-total-row">
          <td>Итого за ${fmtDate(date)}</td>
          <td style="text-align:right">${totalZamenas > 0 ? `${totalPaid} + <span style="color:var(--text)">${totalZamenas} замен</span> (${totalCount})` : totalCount}</td>
          <td style="text-align:right" class="day-amount">${fmtMoney(totalPaid * PRICE_PER_ACCOUNT)}</td>
        </tr>
      </tbody>
    </table>`;
}

setPeriod('may');
</script>
</body>
</html>
