<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дашборд — Закупки аккаунтов</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f0efeb;
    color: #1c1c1a;
    min-height: 100vh;
    padding: 2rem;
    font-size: 15px;
    line-height: 1.5;
  }
  .dash { max-width: 1280px; margin: 0 auto; }
  .page-header { margin-bottom: 2rem; padding-bottom: 1.25rem; border-bottom: 1px solid rgba(0,0,0,0.1); }
  .page-title { font-size: 26px; font-weight: 600; letter-spacing: -0.5px; color: #1c1c1a; }
  .page-sub { font-size: 14px; color: #888780; margin-top: 4px; }

  .top-metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 2rem; }
  .metric { background: #fff; border-radius: 14px; padding: 1.25rem 1.5rem; border: 1px solid rgba(0,0,0,0.07); }
  .metric-label { font-size: 13px; color: #888780; font-weight: 500; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
  .metric-value { font-size: 32px; font-weight: 600; color: #1c1c1a; letter-spacing: -1px; }
  .metric-hint { font-size: 12px; color: #bbb; margin-top: 4px; }

  .controls {
    display: flex; gap: 12px; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center;
    background: #fff; padding: 0.875rem 1.25rem; border-radius: 12px; border: 1px solid rgba(0,0,0,0.07);
  }
  .controls label { font-size: 14px; color: #888780; font-weight: 500; }
  .controls select, .controls input {
    font-size: 14px; font-family: 'Inter', sans-serif; padding: 6px 12px;
    border: 1px solid rgba(0,0,0,0.15); border-radius: 8px; background: #f7f7f5;
    color: #1c1c1a; cursor: pointer; outline: none;
  }
  .controls input { cursor: text; width: 80px; }
  .controls select:focus, .controls input:focus { border-color: #888; }
  .controls .sep { width: 1px; height: 24px; background: rgba(0,0,0,0.1); margin: 0 4px; }

  .section-label { font-size: 13px; font-weight: 600; color: #888780; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 1rem; }

  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; margin-bottom: 2.5rem; }
  .card { background: #fff; border-radius: 16px; padding: 1.25rem 1.5rem; border: 1px solid rgba(0,0,0,0.07); transition: box-shadow 0.15s; }
  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
  .card-id { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
  .card-gmail { font-size: 13px; color: #888780; margin-top: 3px; font-weight: 500; }
  .card-badge { font-size: 13px; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
  .badge-green { background: #E3F3D5; color: #2d6010; }
  .badge-amber { background: #FEF0D8; color: #7a4a08; }
  .badge-red   { background: #FDEAEA; color: #8f2020; }

  .farm-section { margin-bottom: 1rem; }
  .farm-label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .farm-label { font-size: 12px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; }
  .farm-counts { font-size: 13px; color: #888780; }
  .bar-bg { height: 6px; background: #ebebeb; border-radius: 99px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 99px; }

  .divider { height: 1px; background: rgba(0,0,0,0.07); margin: 1rem 0; }

  .doc-block { margin-bottom: 10px; }
  .doc-block:last-child { margin-bottom: 0; }
  .doc-name-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .doc-name { font-size: 14px; font-weight: 600; color: #1c1c1a; }
  .doc-valid-count { font-size: 12px; color: #aaa; }
  .doc-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .doc-bar-bg { flex: 1; height: 5px; background: #ebebeb; border-radius: 99px; overflow: hidden; }
  .doc-bar-fill { height: 100%; border-radius: 99px; }
  .doc-ver-pct { font-size: 14px; font-weight: 600; min-width: 42px; text-align: right; }
  .doc-counters { display: flex; gap: 6px; flex-wrap: wrap; }
  .doc-counter { font-size: 12px; font-weight: 500; padding: 3px 10px; border-radius: 20px; }
  .cnt-pass { background: #E3F3D5; color: #2d6010; }
  .cnt-fail { background: #FDEAEA; color: #8f2020; }
  .cnt-wait { background: #f0efeb; color: #888780; }
  .doc-no-vna { font-size: 13px; color: #bbb; font-style: italic; }

  .heatmap-section { background: #fff; border-radius: 16px; padding: 1.5rem; border: 1px solid rgba(0,0,0,0.07); margin-bottom: 1.5rem; overflow-x: auto; }
  .heatmap-table { border-collapse: separate; border-spacing: 0; font-size: 14px; width: 100%; }
  .heatmap-table th { padding: 8px 14px; color: #888780; font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; text-align: left; border-bottom: 2px solid #f0efeb; white-space: nowrap; }
  .heatmap-table td { padding: 9px 14px; text-align: center; border-bottom: 1px solid #f5f5f3; white-space: nowrap; font-size: 14px; font-weight: 500; }
  .heatmap-table tr:last-child td { border-bottom: none; }
  .heatmap-table .id-cell { text-align: left; color: #555; font-weight: 600; font-size: 14px; }
  .heatmap-table .gmail-cell { text-align: left; color: #888780; font-weight: 500; min-width: 110px; }
  .heatmap-table .farm-cell { font-weight: 600; }

  .legend { display: flex; gap: 16px; font-size: 13px; color: #888780; flex-wrap: wrap; align-items: center; margin-top: 1rem; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-box { width: 14px; height: 14px; border-radius: 4px; }

  .empty-state { text-align: center; padding: 3rem; color: #bbb; font-size: 15px; }

  .hm-cell { position: relative; cursor: default; }
  .hm-cell .tooltip {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: #1c1c1a;
    color: #fff;
    font-size: 12px;
    font-weight: 400;
    border-radius: 8px;
    padding: 8px 12px;
    white-space: nowrap;
    z-index: 100;
    min-width: 160px;
    pointer-events: none;
    line-height: 1.8;
    text-align: left;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  .hm-cell .tooltip::before {
    content: '';
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-bottom-color: #1c1c1a;
  }
  .hm-cell:hover .tooltip { display: block; }

  .card-comment { margin-top: 10px; border-top: 0.5px solid rgba(0,0,0,0.07); padding-top: 10px; }
  .comment-label { font-size: 11px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
  .comment-input {
    width: 100%; font-size: 13px; font-family: 'Inter', sans-serif;
    border: 1px solid rgba(0,0,0,0.12); border-radius: 8px;
    padding: 7px 10px; resize: vertical; min-height: 60px;
    background: #f7f7f5; color: #1c1c1a; outline: none;
    transition: border-color 0.15s;
    line-height: 1.5;
  }
  .comment-input:focus { border-color: #888; background: #fff; }
  .comment-input::placeholder { color: #bbb; }
  .comment-saved { font-size: 11px; color: #3a7d15; margin-top: 4px; display: none; }
</style>
</head>
<body>
<div class="dash">

  <div class="page-header">
    <div class="page-title">Закупки аккаунтов</div>
    <div class="page-sub">Фарм → верификация по закупкам, обновлено 02.04.2026 19:07</div>
  </div>

  <div class="top-metrics" id="top-metrics"></div>

  <div class="controls">
    <label>ID закупки:</label>
    <input type="text" id="filter-id" placeholder="напр. 28" oninput="render()" />
    <div class="sep"></div>
    <label>Gmail Seller:</label>
    <select id="filter-gmail" onchange="render()"><option value="">Все</option></select>
    <div class="sep"></div>
    <label>Doc Seller:</label>
    <select id="filter-doc" onchange="render()"><option value="">Все</option></select>
    <div class="sep"></div>
    <label>Сортировка:</label>
    <select id="sort-by" onchange="render()">
      <option value="id">По ID закупки</option>
      <option value="valid_desc">Выход с фарма ↓</option>
      <option value="valid_asc">Выход с фарма ↑</option>
    </select>
  </div>

  <div class="section-label">Карточки закупок</div>
  <div class="cards-grid" id="cards"></div>

  <div class="section-label">Тепловая карта — % успеха верификации</div>
  <div class="heatmap-section">
    <table class="heatmap-table" id="heatmap"></table>
    <div class="legend">
      <span style="font-weight:600;">Верификация:</span>
      <span class="legend-item"><span class="legend-box" style="background:#E3F3D5;"></span>80% и выше</span>
      <span class="legend-item"><span class="legend-box" style="background:#FEF0D8;"></span>60–79%</span>
      <span class="legend-item"><span class="legend-box" style="background:#FDEAEA;"></span>ниже 60%</span>
      <span class="legend-item"><span class="legend-box" style="background:#f0efeb;border:1px solid #ddd;"></span>нет данных</span>
    </div>
  </div>

</div>

function saveComment(id, val) {
  try { localStorage.setItem('comment_' + id, val); } catch(e) {}
  const el = document.getElementById('saved_' + id);
  if (el) { el.style.display = 'block'; setTimeout(() => { el.style.display = 'none'; }, 1500); }
}
function loadComment(id) {
  try { return localStorage.getItem('comment_' + id) || ''; } catch(e) { return ''; }
}

function farmColor(p){return p>=80?'#3a7d15':p>=60?'#9a5c08':'#c02020';}
function verColor(p){return p>=80?'#3a7d15':p>=60?'#9a5c08':'#c02020';}
function verBg(p){return p>=80?{bg:'#E3F3D5',c:'#2d6010'}:p>=60?{bg:'#FEF0D8',c:'#7a4a08'}:{bg:'#FDEAEA',c:'#8f2020'};}
function badgeClass(p){return p>=80?'badge-green':p>=60?'badge-amber':'badge-red';}

function getFiltered(){
  const g=document.getElementById('filter-gmail').value;
  const dc=document.getElementById('filter-doc').value;
  const idQ=document.getElementById('filter-id').value.trim();
  let d=[...DATA];
  if(idQ) d=d.filter(x=>x.id===idQ);
  if(g) d=d.filter(x=>x.gmail===g);
  if(dc) d=d.filter(x=>x.docs.some(doc=>doc.doc===dc));
  const s=document.getElementById('sort-by').value;
  if(s==='valid_desc') d.sort((a,b)=>b.valid_pct-a.valid_pct);
  else if(s==='valid_asc') d.sort((a,b)=>a.valid_pct-b.valid_pct);
  else d.sort((a,b)=>Number(a.id)-Number(b.id));
  return d;
}

function render(){
  const data=getFiltered();
  const tot=data.reduce((s,d)=>s+Number(d.total),0);
  const val=data.reduce((s,d)=>s+Number(d.valid),0);
  const inv=data.reduce((s,d)=>s+Number(d.invalid),0);
  const farmPct=tot?Math.round(val/tot*1000)/10:0;
  const invPct=tot?Math.round(inv/tot*1000)/10:0;
  const wv=data.flatMap(d=>d.docs).filter(d=>Number(d.vna)>0);
  const avgVer=wv.length?Math.round(wv.reduce((s,d)=>s+Number(d.success_pct),0)/wv.length*10)/10:0;

  document.getElementById('top-metrics').innerHTML=`
    <div class="metric">
      <div class="metric-label">Закупок</div>
      <div class="metric-value">${data.length}</div>
    </div>
    <div class="metric">
      <div class="metric-label">Всего аккаунтов</div>
      <div class="metric-value">${tot.toLocaleString()}</div>
    </div>
    <div class="metric">
      <div class="metric-label">Выдан с фарма</div>
      <div class="metric-value">${farmPct}%</div>
      <div class="metric-hint">отсев: ${invPct}% — пустышки и после 1 логина</div>
    </div>
    <div class="metric">
      <div class="metric-label">Успех верификации</div>
      <div class="metric-value">${avgVer}%</div>
      <div class="metric-hint">из дошедших до верификации</div>
    </div>`;

  const dc=document.getElementById('filter-doc').value;
  document.getElementById('cards').innerHTML=data.length===0
    ?`<div class="empty-state">Нет данных по выбранным фильтрам</div>`
    :data.map(d=>{
      const visibleDocs=dc?d.docs.filter(x=>x.doc===dc):d.docs;
      const docsHtml=visibleDocs.length?`
        <div class="divider"></div>
        ${visibleDocs.map(doc=>{
          if(doc.vna===0&&doc.not_yet===0) return `<div class="doc-block"><div class="doc-name-row"><span class="doc-name">${doc.doc}</span><span class="doc-no-vna">нет данных</span></div></div>`;
          const hasVer=doc.vna>0;
          const barHtml=hasVer?`<div class="doc-bar-row">
            <div class="doc-bar-bg"><div class="doc-bar-fill" style="width:${doc.success_pct}%;background:${verColor(doc.success_pct)};"></div></div>
            <span class="doc-ver-pct" style="color:${verColor(doc.success_pct)};">${doc.success_pct}%</span>
          </div>`:'';
          return `<div class="doc-block">
            <div class="doc-name-row"><span class="doc-name">${doc.doc}</span><span class="doc-valid-count">валид: ${doc.valid}</span></div>
            ${barHtml}
            <div class="doc-counters">
              <span class="doc-counter cnt-pass">прошли ${doc.passed}</span>
              <span class="doc-counter cnt-fail">на замену ${doc.failed}</span>
              <span class="doc-counter cnt-wait">в очереди ${doc.not_yet}</span>
            </div>
          </div>`;
        }).join('')}`
      :`<div class="divider"></div><div class="doc-no-vna">нет данных по верификации</div>`;

      const hasHidden = Number(d.real_total) > Number(d.total);
      const hiddenNote = hasHidden
        ? `<div style="font-size:11px;color:#aaa;margin-top:4px;">всего в закупке: ${d.real_total} — часть на других doc seller или без статуса</div>`
        : '';
      return `<div class="card">
        <div class="card-header">
          <div><div class="card-id">Закупка #${d.id}</div><div class="card-gmail">${d.gmail}</div></div>
          <span class="card-badge ${badgeClass(d.valid_pct)}">${d.valid_pct}%</span>
        </div>
        <div class="farm-section">
          <div class="farm-label-row">
            <span class="farm-label">Выдан с фарма</span>
            <span class="farm-counts">${d.valid} из ${d.total}</span>
          </div>
          <div class="bar-bg"><div class="bar-fill" style="width:${d.valid_pct}%;background:${farmColor(d.valid_pct)};"></div></div>
          ${hiddenNote}
        </div>
        ${docsHtml}
        <div class="card-comment">
          <div class="comment-label">Комментарий</div>
          <textarea
            class="comment-input"
            id="comment_${d.id}"
            placeholder="Добавить заметку по закупке..."
            onchange="saveComment('${d.id}', this.value)"
            oninput="saveComment('${d.id}', this.value)"
          ></textarea>
          <div class="comment-saved" id="saved_${d.id}">Сохранено</div>
        </div>
      </div>`;
    }).join('');

  const docs=['1-k1','3-lod','Fels'];
  data.forEach(d => {
    const ta = document.getElementById('comment_' + d.id);
    if (ta) ta.value = loadComment(d.id);
  });

  document.getElementById('heatmap').innerHTML=`
    <thead><tr>
      <th>ID</th><th>Gmail Seller</th><th>Выдан с фарма</th>
      ${docs.map(d=>`<th>${d}</th>`).join('')}
    </tr></thead>
    <tbody>${data.map(d=>{
      const cells=docs.map(doc=>{
        const f=d.docs.find(x=>x.doc===doc);
        if(!f||f.vna===0) return `<td style="background:#f7f7f5;color:#ccc;">—</td>`;
        const c=verBg(f.success_pct);
        const bans=f.bans||{};
        const banKeys=Object.keys(bans);
        let tooltipRows='';
        if(f.failed>0){
          tooltipRows+=`<div style="color:#aaa;margin-bottom:3px;">на замену: ${f.failed} акк.</div>`;
          if(banKeys.length>0){
            tooltipRows+=banKeys.map(k=>`<div><span style="color:#aaa;">${k}:</span> ${bans[k].n} (${bans[k].pct}%)</div>`).join('');
          } else {
            tooltipRows+=`<div style="color:#aaa;font-style:italic;">причины не указаны</div>`;
          }
        } else {
          tooltipRows=`<div style="color:#9FE1CB;">все прошли верификацию</div>`;
        }
        const tooltip=`<div class="tooltip"><div style="font-weight:600;margin-bottom:4px;">${doc} #${d.id}</div><div style="color:#aaa;margin-bottom:4px;">прошли: ${f.passed} / ${f.vna}</div>${tooltipRows}</div>`;
        return `<td class="hm-cell" style="background:${c.bg};color:${c.c};">${f.success_pct}%${tooltip}</td>`;
      }).join('');
      return `<tr>
        <td class="id-cell">#${d.id}</td>
        <td class="gmail-cell">${d.gmail}</td>
        <td class="farm-cell" style="color:${farmColor(d.valid_pct)};">${d.valid_pct}%</td>
        ${cells}
      </tr>`;
    }).join('')}</tbody>`;
}

const gmails=[...new Set(DATA.map(d=>d.gmail))].sort();
const sel=document.getElementById('filter-gmail');
gmails.forEach(g=>{const o=document.createElement('option');o.value=g;o.textContent=g;sel.appendChild(o);});

const allDocs=[...new Set(DATA.flatMap(d=>d.docs.map(x=>x.doc)))].sort();
const dsel=document.getElementById('filter-doc');
allDocs.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;dsel.appendChild(o);});

render();
</script>
</body>
</html>
