<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Верификации</title>
<style>
  :root {
    --bg: #1a1917;
    --card: #232220;
    --card2: #2a2826;
    --border: #333230;
    --text: #e8e6e2;
    --muted: #888780;
    --accent: #d4944a;
    --green: #4caf7d;
    --red: #e05c5c;
    --blue: #5c9ce0;
    --purple: #9b7fe8;
    --yellow: #d4b44a;
    --orange: #e07a2f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; }

  .page-wrap { max-width: 1400px; margin: 0 auto; padding: 0 24px; }

  .top-bar {
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px;
  }
  .back-link {
    color: var(--muted); text-decoration: none; font-size: 13px;
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px;
    transition: color .15s, border-color .15s;
  }
  .back-link:hover { color: var(--text); border-color: var(--muted); }
  .page-title { font-size: 20px; font-weight: 700; }
  .page-subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .period-bar {
    padding: 16px 0; display: flex; gap: 8px; align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .period-btn {
    padding: 6px 16px; border-radius: 6px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); font-size: 13px; cursor: pointer;
    transition: all .15s;
  }
  .period-btn:hover { color: var(--text); border-color: var(--muted); }
  .period-btn.active { background: var(--card2); color: var(--text); border-color: #555; font-weight: 600; }

  .main { padding: 20px 0; }

  /* ── Funnel ── */
  .funnel-section { margin-bottom: 28px; }
  .section-label {
    font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 14px;
  }
  .funnel-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px;
  }
  .funnel-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px 18px; position: relative;
  }
  .funnel-card.highlight { border-color: var(--accent); }
  .funnel-label { font-size: 11px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .funnel-value { font-size: 32px; font-weight: 700; }
  .funnel-pct { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .funnel-value.green { color: var(--green); }
  .funnel-value.red   { color: var(--red); }
  .funnel-value.blue  { color: var(--blue); }

  /* ── Outcomes ── */
  .outcomes-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px;
    margin-bottom: 28px;
  }
  .outcome-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 14px 16px;
  }
  .outcome-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .outcome-name { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .outcome-val { font-size: 24px; font-weight: 700; }
  .outcome-pct { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* ── Tables ── */
  .table-section { margin-bottom: 28px; }
  .table-wrap { overflow-x: auto; }
  table {
    width: 100%; border-collapse: collapse; font-size: 13px;
  }
  th {
    text-align: left; padding: 8px 12px; font-size: 11px; font-weight: 600;
    letter-spacing: .05em; text-transform: uppercase; color: var(--muted);
    border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  th.r, td.r { text-align: right; }
  td {
    padding: 9px 12px; border-bottom: 1px solid #282624;
  }
  tr:hover td { background: var(--card2); }
  tr:last-child td { border-bottom: none; }

  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600;
  }
  .badge-green { background: rgba(76,175,125,.15); color: var(--green); }
  .badge-red   { background: rgba(224,92,92,.15);  color: var(--red); }
  .badge-blue  { background: rgba(92,156,224,.15); color: var(--blue); }
  .badge-muted { background: rgba(136,135,128,.1); color: var(--muted); }
  .badge-purple { background: rgba(155,127,232,.15); color: var(--purple); }
  .badge-yellow { background: rgba(212,180,74,.15);  color: var(--yellow); }

  .pct-bar {
    display: flex; align-items: center; gap: 8px;
  }
  .bar-outer {
    flex: 1; height: 6px; background: var(--card2); border-radius: 3px; min-width: 60px;
  }
  .bar-inner { height: 100%; border-radius: 3px; }
  .bar-green { background: var(--green); }
  .bar-red   { background: var(--red); }
  .bar-blue  { background: var(--blue); }
  .pct-num { font-size: 12px; color: var(--muted); min-width: 36px; text-align: right; }

  /* ── Weekly ── */
  .week-row-total { font-weight: 600; }

  /* ── Expandable rows ── */
  .expand-btn {
    background: none; border: none; color: var(--muted); cursor: pointer; font-size: 12px;
    padding: 2px 6px; border-radius: 4px; transition: color .15s;
  }
  .expand-btn:hover { color: var(--text); }
  .sub-row { display: none; }
  .sub-row.open { display: table-row; }
  .sub-cell { padding: 0 12px 10px 28px !important; }
  .sub-table { width: 100%; font-size: 12px; }
  .sub-table td { padding: 5px 8px; border-bottom: 1px solid #242220; color: var(--muted); }
  .sub-table tr:last-child td { border-bottom: none; }
  .sub-table td:first-child { color: var(--text); }

  /* ── No data ── */
  .no-data { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }

  .cat-active        { color: var(--green); }
  .cat-zamena        { color: var(--red); }
  .cat-ban           { color: #c44; }
  .cat-biz_verif     { color: var(--blue); }
  .cat-review        { color: var(--yellow); }
  .cat-appeal_failed { color: var(--orange); }
  .cat-other         { color: var(--muted); }
</style>
</head>

function setPeriod(p) {
  activePeriod = p;
  document.getElementById('btn-mar').classList.toggle('active', p === 'mar');

  render();
}

function getData() {
  return activePeriod === 'mar' ? VERIF_MAR : VERIF_APR;

function fmt(n) { return (n == null ? '—' : n); }
function pctFmt(n) { return (n == null ? '—' : n.toFixed(1) + '%'); }

function colorForCat(cat) {
  const m = {active:'green',zamena:'red',ban:'#c44',biz_verif:'blue',review:'yellow',appeal_failed:'orange',other:'muted'};
  return m[cat] || 'muted';
}
function labelForCat(cat) {
  const m = {active:'Активные',zamena:'На замену',ban:'Бан',biz_verif:'Бизнес вериф',review:'Review / Очередь',appeal_failed:'Appeal Failed',other:'Прочее'};
  return m[cat] || cat;
}
function dotColor(cat) {
  const m = {active:'#4caf7d',zamena:'#e05c5c',ban:'#c44444',biz_verif:'#5c9ce0',review:'#d4b44a',appeal_failed:'#e07a2f',other:'#888780'};
  return m[cat] || '#888780';
}
function badgeClass(cat) {
  const m = {active:'badge-green',zamena:'badge-red',ban:'badge-red',biz_verif:'badge-blue',review:'badge-yellow',appeal_failed:'badge-muted',other:'badge-muted'};
  return m[cat] || 'badge-muted';
}

function barHtml(pct, cls) {
  return `<div class="pct-bar"><div class="bar-outer"><div class="bar-inner bar-${cls}" style="width:${Math.min(pct||0,100)}%"></div></div><span class="pct-num">${pctFmt(pct)}</span></div>`;
}
